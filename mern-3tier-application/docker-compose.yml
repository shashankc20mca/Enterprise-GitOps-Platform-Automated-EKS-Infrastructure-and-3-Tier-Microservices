services:
  mongodb:
    image: mongo:latest
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin1
      MONGO_INITDB_ROOT_PASSWORD: admin1234
    volumes:
      - mongo-data:/data/db
    networks:
      - mern_network
    restart: unless-stopped
    # don't expose 27017 in production

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin1
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin1234
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8081:8081"
    depends_on:
      - mongodb
    networks:
      - mern_network
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      PORT: "8333"
      MONGO_HOST: "mongodb"
      MONGO_PORT: "27017"
      MONGO_DB: appdb
      MONGO_USERNAME: admin1
      MONGO_PASSWORD: admin1234
      JWT_SECRET: supersecret_change_me
    ports:
      - "8383:8333"
    depends_on:
      - mongodb
    networks:
      - mern_network
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      PORT: "5050"
      REACT_APP_API_URL: "http://localhost:8383"
    ports:
      - "5050:5050"
    depends_on:
      - backend
    networks:
      - mern_network
    restart: unless-stopped

networks:
  mern_network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
